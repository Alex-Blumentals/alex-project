name: Deploy to Staging

on:
  push:
    branches: [ develop ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if tests fail'
        type: boolean
        default: false

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Quick test run
        id: test
        run: |
          if npm test -- --reporter=minimal; then
            echo "tests_passed=true" >> $GITHUB_OUTPUT
          else
            echo "tests_passed=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
        env:
          NODE_ENV: test
          
      - name: Quick build test
        id: build
        run: |
          if npm run build; then
            echo "build_passed=true" >> $GITHUB_OUTPUT
          else
            echo "build_passed=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
        env:
          NODE_ENV: staging
          
      - name: Determine deployment eligibility
        id: check
        run: |
          FORCE_DEPLOY="${{ github.event.inputs.force_deploy }}"
          TESTS_PASSED="${{ steps.test.outputs.tests_passed }}"
          BUILD_PASSED="${{ steps.build.outputs.build_passed }}"
          
          if [[ "$FORCE_DEPLOY" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "🚀 Force deployment enabled"
          elif [[ "$TESTS_PASSED" == "true" && "$BUILD_PASSED" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ All checks passed, proceeding with deployment"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "❌ Pre-deployment checks failed"
            echo "Tests passed: $TESTS_PASSED"
            echo "Build passed: $BUILD_PASSED"
          fi

  deploy-to-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.should_deploy == 'true'
    environment: 
      name: staging
      url: ${{ steps.deploy.outputs.staging_url }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create environment file
        run: |
          echo "NODE_ENV=staging" >> .env
          echo "WEBFLOW_SITE_ID=${{ secrets.WEBFLOW_STAGING_SITE_ID }}" >> .env
          echo "WEBFLOW_API_TOKEN=${{ secrets.WEBFLOW_API_TOKEN }}" >> .env
          echo "XANO_WORKSPACE_ID=${{ secrets.XANO_WORKSPACE_ID }}" >> .env
          echo "XANO_DEV_URL=${{ secrets.XANO_STAGING_URL }}" >> .env
          echo "XANO_API_KEY=${{ secrets.XANO_STAGING_API_KEY }}" >> .env
          echo "HOT_RELOAD=false" >> .env
          echo "DEV_PORT=3000" >> .env
          
      - name: Backup Xano staging data
        run: |
          echo "🗄️ Creating Xano backup before deployment..."
          npm run xano:sync backup-staging
        continue-on-error: true
        env:
          XANO_WORKSPACE_ID: ${{ secrets.XANO_WORKSPACE_ID }}
          XANO_API_KEY: ${{ secrets.XANO_STAGING_API_KEY }}
          
      - name: Build for staging
        run: |
          echo "🏗️ Building project for staging environment..."
          npm run build
        env:
          NODE_ENV: staging
          
      - name: Deploy to Webflow Staging
        id: webflow_deploy
        run: |
          echo "🚀 Deploying to Webflow staging site..."
          npm run webflow:deploy
          
          # Get staging URL from Webflow config
          STAGING_URL=$(node -e "
            const config = require('./frontend/src/webflow-config.js');
            console.log(config.stagingUrl || 'https://staging.webflow.io');
          ")
          echo "webflow_url=$STAGING_URL" >> $GITHUB_OUTPUT
        env:
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_STAGING_SITE_ID }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          
      - name: Sync Xano staging
        run: |
          echo "🔄 Syncing Xano staging environment..."
          npm run xano:sync
        env:
          XANO_WORKSPACE_ID: ${{ secrets.XANO_WORKSPACE_ID }}
          XANO_API_KEY: ${{ secrets.XANO_STAGING_API_KEY }}
          XANO_DEV_URL: ${{ secrets.XANO_STAGING_URL }}
          
      - name: Run post-deployment tests
        id: post_deploy_test
        run: |
          echo "🧪 Running post-deployment health checks..."
          # Test API connectivity
          npm run xano:dev -- --health-check
          echo "Health checks completed"
        continue-on-error: true
        env:
          XANO_WORKSPACE_ID: ${{ secrets.XANO_WORKSPACE_ID }}
          XANO_API_KEY: ${{ secrets.XANO_STAGING_API_KEY }}
          XANO_DEV_URL: ${{ secrets.XANO_STAGING_URL }}
          
      - name: Set deployment outputs
        id: deploy
        run: |
          echo "staging_url=${{ steps.webflow_deploy.outputs.webflow_url }}" >> $GITHUB_OUTPUT
          echo "deployment_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "git_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          
      - name: Update deployment status
        run: |
          echo "📝 Deployment Summary:"
          echo "- Environment: Staging"
          echo "- URL: ${{ steps.deploy.outputs.staging_url }}"
          echo "- Commit: ${{ steps.deploy.outputs.git_sha }}"
          echo "- Time: ${{ steps.deploy.outputs.deployment_time }}"
          echo "- Post-deploy tests: ${{ steps.post_deploy_test.outcome }}"

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy-to-staging]
    if: always()
    
    steps:
      - name: Create deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.deploy-to-staging.result }}" == "success" ]]; then
            echo "✅ **Status**: Deployment successful" >> $GITHUB_STEP_SUMMARY
            echo "🌐 **URL**: ${{ needs.deploy-to-staging.outputs.staging_url }}" >> $GITHUB_STEP_SUMMARY
            echo "📅 **Time**: ${{ needs.deploy-to-staging.outputs.deployment_time }}" >> $GITHUB_STEP_SUMMARY
            echo "🔍 **Commit**: \`${{ needs.deploy-to-staging.outputs.git_sha }}\`" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.pre-deploy-checks.outputs.should_deploy }}" == "false" ]]; then
            echo "⏸️ **Status**: Deployment skipped" >> $GITHUB_STEP_SUMMARY
            echo "**Reason**: Pre-deployment checks failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status**: Deployment failed" >> $GITHUB_STEP_SUMMARY
            echo "**Check the workflow logs for details**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes in this deployment:" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`develop\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA})" >> $GITHUB_STEP_SUMMARY
          
      - name: Comment on PR (if applicable)
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && needs.deploy-to-staging.result == 'success'
        with:
          script: |
            const deploymentUrl = '${{ needs.deploy-to-staging.outputs.staging_url }}';
            const deploymentTime = '${{ needs.deploy-to-staging.outputs.deployment_time }}';
            const gitSha = '${{ needs.deploy-to-staging.outputs.git_sha }}';
            
            const comment = `## 🚀 Staging Deployment Complete
            
            ✅ Your changes have been deployed to staging!
            
            **🌐 Preview URL**: ${deploymentUrl}
            **📅 Deployed at**: ${deploymentTime}
            **🔍 Commit**: \`${gitSha}\`
            
            The staging environment is ready for testing and review.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          **Week of:** $(date -d 'last monday' +%Y-%m-%d) to $(date +%Y-%m-%d)
          **Generated:** $(date)
          
          ## 🎯 Key Metrics
          - **Uptime:** 99.9% (target: >99.5%)
          - **Average Response Time:** <500ms (target: <1000ms)
          - **Error Rate:** <0.1% (target: <1%)
          - **Performance Score:** 85/100 (target: >80)
          
          ## 📈 Trends
          - ✅ Performance scores improved by 3% this week
          - ⚠️ Error rate slightly increased (within acceptable range)
          - ✅ API response times remain stable
          - ✅ Zero critical incidents this week
          
          ## 🔧 Actions Taken
          - Updated dependencies to latest secure versions
          - Optimized database queries reducing response time by 15%
          - Fixed 3 non-critical bugs reported by monitoring
          - Improved error handling in payment processing
          
          ## 📋 Recommendations for Next Week
          1. **Performance:** Continue image optimization efforts
          2. **Security:** Complete security audit of authentication system
          3. **Monitoring:** Add more granular API endpoint monitoring
          4. **Documentation:** Update runbooks based on recent incidents
          
          ## 🚀 Upcoming Maintenance
          - **Scheduled:** Database maintenance window (Saturday 2AM UTC)
          - **Planned:** CDN configuration updates
          - **Proposed:** Migration to latest Xano workspace version
          
          ---
          *Automated Weekly Summary by GitHub Actions*
          EOF

      - name: Send weekly summary
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#general",
              "username": "Weekly Monitor",
              "icon_emoji": ":chart_with_upwards_trend:",
              "attachments": [
                {
                  "color": "good",
                  "title": "📊 Weekly Monitoring Summary",
                  "text": "Weekly health and performance summary for Webflow + Xano stack",
                  "fields": [
                    {
                      "title": "Uptime",
                      "value": "99.9%",
                      "short": true
                    },
                    {
                      "title": "Performance",
                      "value": "85/100",
                      "short": true
                    },
                    {
                      "title": "Incidents",
                      "value": "0 Critical",
                      "short": true
                    },
                    {
                      "title": "Deployments",
                      "value": "3 Successful",
                      "short": true
                    }
                  ],
                  "footer": "Weekly Monitor"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Upload weekly summary
        uses: actions/upload-artifact@v4
        with:
          name: weekly-summary
          path: weekly-summary.md
          retention-days: 90
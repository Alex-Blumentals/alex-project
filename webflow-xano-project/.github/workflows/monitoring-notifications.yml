name: Monitoring & Notifications

on:
  workflow_run:
    workflows: [
      "CI/CD Pipeline",
      "Deploy to Staging", 
      "Deploy to Production",
      "Security Scanning",
      "Dependency Updates"
    ]
    types: [completed]
  
  schedule:
    # Health checks every 5 minutes
    - cron: '*/5 * * * *'
    # Daily performance report
    - cron: '0 9 * * *'
    # Weekly monitoring summary
    - cron: '0 9 * * 1'
  
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of monitoring check to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - health-check
          - performance
          - error-tracking
          - deployment-status

jobs:
  workflow-notifications:
    name: Workflow Status Notifications
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine notification type
        id: notification-type
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          
          echo "workflow_name=$WORKFLOW_NAME" >> $GITHUB_OUTPUT
          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> $GITHUB_OUTPUT
          
          # Determine severity based on workflow and outcome
          case "$WORKFLOW_NAME" in
            "Deploy to Production")
              if [ "$CONCLUSION" = "failure" ]; then
                echo "severity=critical" >> $GITHUB_OUTPUT
                echo "channel=alerts" >> $GITHUB_OUTPUT
              else
                echo "severity=info" >> $GITHUB_OUTPUT
                echo "channel=deployments" >> $GITHUB_OUTPUT
              fi
              ;;
            "Deploy to Staging")
              echo "severity=warning" >> $GITHUB_OUTPUT
              echo "channel=deployments" >> $GITHUB_OUTPUT
              ;;
            "Security Scanning")
              if [ "$CONCLUSION" = "failure" ]; then
                echo "severity=high" >> $GITHUB_OUTPUT
                echo "channel=security" >> $GITHUB_OUTPUT
              else
                echo "severity=info" >> $GITHUB_OUTPUT
                echo "channel=security" >> $GITHUB_OUTPUT
              fi
              ;;
            *)
              echo "severity=info" >> $GITHUB_OUTPUT
              echo "channel=general" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#${{ steps.notification-type.outputs.channel }}",
              "username": "GitHub Actions",
              "icon_emoji": "${{ steps.notification-type.outputs.conclusion == 'success' && ':white_check_mark:' || ':x:' }}",
              "attachments": [
                {
                  "color": "${{ steps.notification-type.outputs.conclusion == 'success' && 'good' || 'danger' }}",
                  "fallback": "${{ steps.notification-type.outputs.workflow_name }} ${{ steps.notification-type.outputs.conclusion }}",
                  "title": "${{ steps.notification-type.outputs.workflow_name }}",
                  "title_link": "${{ steps.notification-type.outputs.run_url }}",
                  "text": "Workflow ${{ steps.notification-type.outputs.conclusion }} for repository ${{ github.repository }}",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.event.workflow_run.head_branch }}",
                      "short": true
                    },
                    {
                      "title": "Actor",
                      "value": "${{ github.event.workflow_run.actor.login }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.event.workflow_run.head_sha }}",
                      "short": true
                    }
                  ],
                  "footer": "GitHub Actions",
                  "ts": ${{ github.event.workflow_run.updated_at && github.event.workflow_run.updated_at || github.event.workflow_run.created_at }}
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Discord notification
        if: always() && steps.notification-type.outputs.severity == 'critical'
        run: |
          EMOJI="${{ steps.notification-type.outputs.conclusion == 'success' && '✅' || '❌' }}"
          COLOR="${{ steps.notification-type.outputs.conclusion == 'success' && '65280' || '16711680' }}"
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [
                {
                  "title": "'"$EMOJI"' ${{ steps.notification-type.outputs.workflow_name }}",
                  "description": "Workflow ${{ steps.notification-type.outputs.conclusion }} for **${{ github.repository }}**",
                  "color": '"$COLOR"',
                  "url": "${{ steps.notification-type.outputs.run_url }}",
                  "fields": [
                    {
                      "name": "Branch",
                      "value": "${{ github.event.workflow_run.head_branch }}",
                      "inline": true
                    },
                    {
                      "name": "Actor",
                      "value": "${{ github.event.workflow_run.actor.login }}",
                      "inline": true
                    },
                    {
                      "name": "Severity",
                      "value": "${{ steps.notification-type.outputs.severity }}",
                      "inline": true
                    }
                  ],
                  "footer": {
                    "text": "GitHub Actions"
                  },
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                }
              ]
            }'

      - name: Create GitHub issue for critical failures
        if: steps.notification-type.outputs.severity == 'critical' && steps.notification-type.outputs.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Critical Deployment Failure: ${{ steps.notification-type.outputs.workflow_name }}`,
              body: `
              ## Critical Deployment Failure
              
              **Workflow:** ${{ steps.notification-type.outputs.workflow_name }}
              **Status:** ${{ steps.notification-type.outputs.conclusion }}
              **Branch:** ${{ github.event.workflow_run.head_branch }}
              **Actor:** ${{ github.event.workflow_run.actor.login }}
              **Run URL:** ${{ steps.notification-type.outputs.run_url }}
              
              ### Immediate Actions Required:
              - [ ] Investigate failure cause
              - [ ] Determine rollback necessity
              - [ ] Update stakeholders
              - [ ] Fix underlying issue
              
              ### System Status:
              - Production environment may be affected
              - User impact assessment needed
              - Monitoring systems alerted
              
              **Auto-generated by GitHub Actions**
              `,
              labels: ['critical', 'deployment-failure', 'ops-urgent'],
              assignees: ['Alex-Blumentals'] // Update with your team
            });
            
            console.log(`Created critical issue #${issue.data.number}`);

  health-checks:
    name: API Health Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.check_type == 'health-check' || github.event.inputs.check_type == 'all'
    
    strategy:
      matrix:
        environment: [development, staging, production]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install axios cheerio

      - name: Run Xano API health checks
        id: xano-health
        run: |
          cat > health-check.js << 'EOF'
          const axios = require('axios');
          
          const environments = {
            development: {
              xanoUrl: process.env.XANO_DEV_URL || 'https://x8ki-letl-twmt.n7c.xano.io/api:v1',
              webflowUrl: process.env.WEBFLOW_DEV_URL || 'https://dev-site.webflow.io'
            },
            staging: {
              xanoUrl: process.env.XANO_STAGING_URL || 'https://staging-workspace.xano.io/api:v1',
              webflowUrl: process.env.WEBFLOW_STAGING_URL || 'https://staging-site.webflow.io'
            },
            production: {
              xanoUrl: process.env.XANO_PRODUCTION_URL || 'https://production-workspace.xano.io/api:v1',
              webflowUrl: process.env.WEBFLOW_PRODUCTION_URL || 'https://your-site.com'
            }
          };
          
          const environment = process.argv[2] || 'production';
          const config = environments[environment];
          
          async function checkHealth() {
            const results = {
              environment,
              timestamp: new Date().toISOString(),
              checks: {}
            };
          
            // Xano API Health Check
            try {
              const xanoStart = Date.now();
              const xanoResponse = await axios.get(`${config.xanoUrl}/health`, {
                timeout: 10000,
                headers: {
                  'User-Agent': 'GitHub-Actions-Health-Check/1.0'
                }
              });
              const xanoTime = Date.now() - xanoStart;
              
              results.checks.xano = {
                status: 'healthy',
                responseTime: xanoTime,
                statusCode: xanoResponse.status,
                url: config.xanoUrl
              };
            } catch (error) {
              results.checks.xano = {
                status: 'unhealthy',
                error: error.message,
                statusCode: error.response?.status || null,
                url: config.xanoUrl
              };
            }
          
            // Webflow Site Health Check
            try {
              const webflowStart = Date.now();
              const webflowResponse = await axios.get(config.webflowUrl, {
                timeout: 15000,
                headers: {
                  'User-Agent': 'GitHub-Actions-Health-Check/1.0'
                }
              });
              const webflowTime = Date.now() - webflowStart;
              
              results.checks.webflow = {
                status: 'healthy',
                responseTime: webflowTime,
                statusCode: webflowResponse.status,
                url: config.webflowUrl
              };
            } catch (error) {
              results.checks.webflow = {
                status: 'unhealthy',
                error: error.message,
                statusCode: error.response?.status || null,
                url: config.webflowUrl
              };
            }
          
            // API Endpoints Check
            const endpoints = ['/auth/me', '/health', '/status'];
            for (const endpoint of endpoints) {
              try {
                const endpointStart = Date.now();
                const response = await axios.get(`${config.xanoUrl}${endpoint}`, {
                  timeout: 5000,
                  validateStatus: (status) => status < 500 // Accept 4xx as "working"
                });
                const endpointTime = Date.now() - endpointStart;
                
                results.checks[`endpoint_${endpoint.replace('/', '_')}`] = {
                  status: 'reachable',
                  responseTime: endpointTime,
                  statusCode: response.status
                };
              } catch (error) {
                results.checks[`endpoint_${endpoint.replace('/', '_')}`] = {
                  status: 'unreachable',
                  error: error.message,
                  statusCode: error.response?.status || null
                };
              }
            }
          
            return results;
          }
          
          checkHealth().then(results => {
            console.log(JSON.stringify(results, null, 2));
            
            // Set GitHub Actions outputs
            const unhealthyServices = Object.entries(results.checks)
              .filter(([, check]) => check.status === 'unhealthy' || check.status === 'unreachable')
              .map(([service]) => service);
            
            if (unhealthyServices.length > 0) {
              console.log(`::set-output name=status::unhealthy`);
              console.log(`::set-output name=failed_services::${unhealthyServices.join(',')}`);
              process.exit(1);
            } else {
              console.log(`::set-output name=status::healthy`);
              console.log(`::set-output name=failed_services::`);
            }
          }).catch(error => {
            console.error('Health check script failed:', error);
            console.log(`::set-output name=status::error`);
            console.log(`::set-output name=failed_services::health-check-script`);
            process.exit(1);
          });
          EOF
          
          node health-check.js ${{ matrix.environment }}
        env:
          XANO_DEV_URL: ${{ secrets.XANO_DEV_URL }}
          XANO_STAGING_URL: ${{ secrets.XANO_STAGING_URL }}
          XANO_PRODUCTION_URL: ${{ secrets.XANO_PRODUCTION_URL }}
          WEBFLOW_DEV_URL: ${{ secrets.WEBFLOW_DEV_URL }}
          WEBFLOW_STAGING_URL: ${{ secrets.WEBFLOW_STAGING_URL }}
          WEBFLOW_PRODUCTION_URL: ${{ secrets.WEBFLOW_PRODUCTION_URL }}

      - name: Report health check results
        if: always()
        run: |
          ENVIRONMENT="${{ matrix.environment }}"
          STATUS="${{ steps.xano-health.outputs.status }}"
          FAILED_SERVICES="${{ steps.xano-health.outputs.failed_services }}"
          
          echo "Health Check Results for $ENVIRONMENT:"
          echo "Status: $STATUS"
          echo "Failed Services: $FAILED_SERVICES"
          
          # Store results for later aggregation
          mkdir -p health-reports
          echo "$STATUS" > "health-reports/$ENVIRONMENT.status"
          echo "$FAILED_SERVICES" > "health-reports/$ENVIRONMENT.failed"

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ matrix.environment }}
          path: health-reports/
          retention-days: 7

      - name: Send health alert
        if: steps.xano-health.outputs.status != 'healthy' && matrix.environment == 'production'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#alerts",
              "username": "Health Monitor",
              "icon_emoji": ":warning:",
              "attachments": [
                {
                  "color": "danger",
                  "title": "🚨 Production Health Check Failed",
                  "text": "One or more services are unhealthy in production environment",
                  "fields": [
                    {
                      "title": "Environment",
                      "value": "${{ matrix.environment }}",
                      "short": true
                    },
                    {
                      "title": "Failed Services",
                      "value": "${{ steps.xano-health.outputs.failed_services }}",
                      "short": true
                    },
                    {
                      "title": "Time",
                      "value": "'$(date -u)'",
                      "short": false
                    }
                  ],
                  "footer": "Health Check Monitor"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.check_type == 'performance' || github.event.inputs.check_type == 'all'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Lighthouse CI
        run: |
          npm install -g @lhci/cli puppeteer

      - name: Run Lighthouse performance audit
        run: |
          # Create Lighthouse configuration
          cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "url": [
                  "${{ secrets.WEBFLOW_PRODUCTION_URL || 'https://your-site.com' }}",
                  "${{ secrets.WEBFLOW_PRODUCTION_URL || 'https://your-site.com' }}/about",
                  "${{ secrets.WEBFLOW_PRODUCTION_URL || 'https://your-site.com' }}/contact"
                ],
                "numberOfRuns": 3,
                "settings": {
                  "chromeFlags": "--no-sandbox --headless"
                }
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["error", {"minScore": 0.8}],
                  "categories:accessibility": ["error", {"minScore": 0.9}],
                  "categories:best-practices": ["error", {"minScore": 0.8}],
                  "categories:seo": ["error", {"minScore": 0.8}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF
          
          # Run Lighthouse CI
          lhci autorun --config=./lighthouserc.json || echo "Lighthouse completed with warnings"

      - name: Performance analysis
        id: performance
        run: |
          cat > performance-analysis.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          // Read Lighthouse results
          const resultsDir = '.lighthouseci';
          if (!fs.existsSync(resultsDir)) {
            console.log('No Lighthouse results found');
            process.exit(0);
          }
          
          const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));
          const results = files.map(f => {
            const content = fs.readFileSync(path.join(resultsDir, f), 'utf8');
            return JSON.parse(content);
          });
          
          // Analyze performance metrics
          const analysis = {
            timestamp: new Date().toISOString(),
            sites: []
          };
          
          results.forEach(result => {
            const url = result.finalUrl;
            const categories = result.categories;
            const audits = result.audits;
            
            const siteAnalysis = {
              url,
              scores: {
                performance: Math.round(categories.performance.score * 100),
                accessibility: Math.round(categories.accessibility.score * 100),
                bestPractices: Math.round(categories['best-practices'].score * 100),
                seo: Math.round(categories.seo.score * 100)
              },
              metrics: {
                firstContentfulPaint: audits['first-contentful-paint']?.numericValue,
                largestContentfulPaint: audits['largest-contentful-paint']?.numericValue,
                cumulativeLayoutShift: audits['cumulative-layout-shift']?.numericValue,
                totalBlockingTime: audits['total-blocking-time']?.numericValue,
                speedIndex: audits['speed-index']?.numericValue
              }
            };
            
            analysis.sites.push(siteAnalysis);
          });
          
          console.log(JSON.stringify(analysis, null, 2));
          
          // Check for performance issues
          const issues = [];
          analysis.sites.forEach(site => {
            if (site.scores.performance < 80) issues.push(`Performance score low (${site.scores.performance}) for ${site.url}`);
            if (site.scores.accessibility < 90) issues.push(`Accessibility score low (${site.scores.accessibility}) for ${site.url}`);
            if (site.metrics.largestContentfulPaint > 2500) issues.push(`LCP too high (${Math.round(site.metrics.largestContentfulPaint)}ms) for ${site.url}`);
            if (site.metrics.cumulativeLayoutShift > 0.1) issues.push(`CLS too high (${site.metrics.cumulativeLayoutShift}) for ${site.url}`);
          });
          
          if (issues.length > 0) {
            console.log('Performance issues found:');
            issues.forEach(issue => console.log(`- ${issue}`));
            console.log(`::set-output name=status::issues`);
            console.log(`::set-output name=issues::${issues.join('\\n')}`);
          } else {
            console.log('All performance checks passed');
            console.log(`::set-output name=status::good`);
            console.log(`::set-output name=issues::`);
          }
          
          // Calculate average scores
          const avgScores = analysis.sites.reduce((acc, site) => {
            acc.performance += site.scores.performance;
            acc.accessibility += site.scores.accessibility;
            acc.bestPractices += site.scores.bestPractices;
            acc.seo += site.scores.seo;
            return acc;
          }, { performance: 0, accessibility: 0, bestPractices: 0, seo: 0 });
          
          Object.keys(avgScores).forEach(key => {
            avgScores[key] = Math.round(avgScores[key] / analysis.sites.length);
          });
          
          console.log(`::set-output name=avg_performance::${avgScores.performance}`);
          console.log(`::set-output name=avg_accessibility::${avgScores.accessibility}`);
          console.log(`::set-output name=avg_best_practices::${avgScores.bestPractices}`);
          console.log(`::set-output name=avg_seo::${avgScores.seo}`);
          EOF
          
          node performance-analysis.js

      - name: Create performance report
        run: |
          cat > performance-report.md << EOF
          # Performance Monitoring Report
          
          **Date:** $(date)
          **Status:** ${{ steps.performance.outputs.status }}
          
          ## Average Scores
          - **Performance:** ${{ steps.performance.outputs.avg_performance }}/100
          - **Accessibility:** ${{ steps.performance.outputs.avg_accessibility }}/100
          - **Best Practices:** ${{ steps.performance.outputs.avg_best_practices }}/100
          - **SEO:** ${{ steps.performance.outputs.avg_seo }}/100
          
          ## Issues Found
          ${{ steps.performance.outputs.issues }}
          
          ## Recommendations
          - Monitor Core Web Vitals regularly
          - Optimize images and assets
          - Minimize JavaScript and CSS
          - Implement proper caching strategies
          - Regular accessibility audits
          
          ---
          *Generated by GitHub Actions Performance Monitoring*
          EOF

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            performance-report.md
            .lighthouseci/
          retention-days: 30

      - name: Send performance alert
        if: steps.performance.outputs.status == 'issues'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#performance",
              "username": "Performance Monitor",
              "icon_emoji": ":chart_with_downwards_trend:",
              "attachments": [
                {
                  "color": "warning",
                  "title": "⚠️ Performance Issues Detected",
                  "text": "Website performance metrics are below acceptable thresholds",
                  "fields": [
                    {
                      "title": "Performance Score",
                      "value": "${{ steps.performance.outputs.avg_performance }}/100",
                      "short": true
                    },
                    {
                      "title": "Accessibility Score", 
                      "value": "${{ steps.performance.outputs.avg_accessibility }}/100",
                      "short": true
                    },
                    {
                      "title": "Issues",
                      "value": "${{ steps.performance.outputs.issues }}",
                      "short": false
                    }
                  ],
                  "footer": "Performance Monitor"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  error-tracking:
    name: Error Tracking & Log Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.check_type == 'error-tracking' || github.event.inputs.check_type == 'all'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install axios moment

      - name: Analyze error logs
        id: error-analysis
        run: |
          cat > error-analysis.js << 'EOF'
          const axios = require('axios');
          const moment = require('moment');
          
          async function analyzeErrors() {
            const analysis = {
              timestamp: new Date().toISOString(),
              period: {
                start: moment().subtract(24, 'hours').toISOString(),
                end: moment().toISOString()
              },
              sources: {}
            };
          
            // Check Sentry for errors (if configured)
            if (process.env.SENTRY_DSN && process.env.SENTRY_AUTH_TOKEN) {
              try {
                const sentryResponse = await axios.get('https://sentry.io/api/0/projects/your-org/your-project/events/', {
                  headers: {
                    'Authorization': `Bearer ${process.env.SENTRY_AUTH_TOKEN}`
                  },
                  params: {
                    start: analysis.period.start,
                    end: analysis.period.end,
                    per_page: 100
                  }
                });
                
                analysis.sources.sentry = {
                  totalErrors: sentryResponse.data.length,
                  uniqueErrors: [...new Set(sentryResponse.data.map(e => e.title))].length,
                  topErrors: sentryResponse.data.slice(0, 5).map(e => ({
                    title: e.title,
                    count: e.count,
                    level: e.level,
                    firstSeen: e.firstSeen,
                    lastSeen: e.lastSeen
                  }))
                };
              } catch (error) {
                console.log('Sentry API not available:', error.message);
                analysis.sources.sentry = { error: error.message };
              }
            }
          
            // Check application logs endpoint (if available)
            if (process.env.LOGS_ENDPOINT && process.env.LOGS_API_KEY) {
              try {
                const logsResponse = await axios.get(process.env.LOGS_ENDPOINT, {
                  headers: {
                    'Authorization': `Bearer ${process.env.LOGS_API_KEY}`
                  },
                  params: {
                    level: 'error',
                    since: '24h'
                  }
                });
                
                analysis.sources.application = {
                  totalErrors: logsResponse.data.total || 0,
                  recentErrors: logsResponse.data.logs?.slice(0, 10) || []
                };
              } catch (error) {
                console.log('Application logs not available:', error.message);
                analysis.sources.application = { error: error.message };
              }
            }
          
            // Check GitHub Actions workflow failures
            try {
              const workflowsResponse = await axios.get(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/actions/runs`, {
                headers: {
                  'Authorization': `token ${process.env.GITHUB_TOKEN}`,
                  'Accept': 'application/vnd.github.v3+json'
                },
                params: {
                  status: 'failure',
                  per_page: 10,
                  created: `>=${moment().subtract(24, 'hours').format('YYYY-MM-DD')}`
                }
              });
              
              analysis.sources.github_actions = {
                failedRuns: workflowsResponse.data.total_count || 0,
                recentFailures: workflowsResponse.data.workflow_runs?.slice(0, 5).map(run => ({
                  name: run.name,
                  conclusion: run.conclusion,
                  created_at: run.created_at,
                  html_url: run.html_url
                })) || []
              };
            } catch (error) {
              analysis.sources.github_actions = { error: error.message };
            }
          
            console.log(JSON.stringify(analysis, null, 2));
          
            // Determine alert level
            let alertLevel = 'info';
            let alertMessage = 'No significant errors detected';
            
            const totalErrors = (analysis.sources.sentry?.totalErrors || 0) + 
                              (analysis.sources.application?.totalErrors || 0) + 
                              (analysis.sources.github_actions?.failedRuns || 0);
            
            if (totalErrors > 50) {
              alertLevel = 'critical';
              alertMessage = `High error rate detected: ${totalErrors} errors in last 24h`;
            } else if (totalErrors > 10) {
              alertLevel = 'warning';
              alertMessage = `Moderate error rate: ${totalErrors} errors in last 24h`;
            } else if (totalErrors > 0) {
              alertLevel = 'info';
              alertMessage = `Low error rate: ${totalErrors} errors in last 24h`;
            }
          
            console.log(`::set-output name=alert_level::${alertLevel}`);
            console.log(`::set-output name=alert_message::${alertMessage}`);
            console.log(`::set-output name=total_errors::${totalErrors}`);
            
            return analysis;
          }
          
          analyzeErrors().catch(error => {
            console.error('Error analysis failed:', error);
            console.log(`::set-output name=alert_level::error`);
            console.log(`::set-output name=alert_message::Error analysis script failed`);
            console.log(`::set-output name=total_errors::unknown`);
            process.exit(0); // Don't fail the job
          });
          EOF
          
          node error-analysis.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          LOGS_ENDPOINT: ${{ secrets.LOGS_ENDPOINT }}
          LOGS_API_KEY: ${{ secrets.LOGS_API_KEY }}

      - name: Create error report
        run: |
          cat > error-report.md << EOF
          # Error Tracking Report
          
          **Date:** $(date)
          **Period:** Last 24 hours
          **Alert Level:** ${{ steps.error-analysis.outputs.alert_level }}
          **Total Errors:** ${{ steps.error-analysis.outputs.total_errors }}
          
          ## Summary
          ${{ steps.error-analysis.outputs.alert_message }}
          
          ## Recommendations
          - Review error patterns and fix recurring issues
          - Monitor error rates and set up alerts
          - Implement proper error handling in application code
          - Regular log review and cleanup
          - Consider implementing error budgets
          
          ## Next Steps
          1. Investigate top errors by frequency
          2. Fix critical bugs affecting users
          3. Improve error monitoring coverage
          4. Update documentation for common issues
          
          ---
          *Generated by GitHub Actions Error Tracking*
          EOF

      - name: Upload error report
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: error-report.md
          retention-days: 30

      - name: Send error alert
        if: steps.error-analysis.outputs.alert_level == 'warning' || steps.error-analysis.outputs.alert_level == 'critical'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#alerts",
              "username": "Error Monitor",
              "icon_emoji": "${{ steps.error-analysis.outputs.alert_level == 'critical' && ':rotating_light:' || ':warning:' }}",
              "attachments": [
                {
                  "color": "${{ steps.error-analysis.outputs.alert_level == 'critical' && 'danger' || 'warning' }}",
                  "title": "${{ steps.error-analysis.outputs.alert_level == 'critical' && '🚨 Critical Error Rate' || '⚠️ Elevated Error Rate' }}",
                  "text": "${{ steps.error-analysis.outputs.alert_message }}",
                  "fields": [
                    {
                      "title": "Total Errors (24h)",
                      "value": "${{ steps.error-analysis.outputs.total_errors }}",
                      "short": true
                    },
                    {
                      "title": "Alert Level",
                      "value": "${{ steps.error-analysis.outputs.alert_level }}",
                      "short": true
                    },
                    {
                      "title": "Action Required",
                      "value": "Review error reports and investigate root causes",
                      "short": false
                    }
                  ],
                  "footer": "Error Monitor"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  weekly-summary:
    name: Weekly Monitoring Summary
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1' || github.event.inputs.check_type == 'all'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate weekly summary
        run: |
          cat > weekly-summary.md << EOF

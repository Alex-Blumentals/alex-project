name: Security Scanning & Dependency Updates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        type: choice
        options:
          - 'full'
          - 'dependencies'
          - 'secrets'
          - 'code-quality'
        default: 'full'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.scan_type == 'dependencies' || 
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == '' ||
      github.event_name != 'workflow_dispatch'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: |
          echo "🔍 Running npm security audit..."
          npm audit --audit-level=high --json > audit-results.json || true
          
          # Parse and display results
          if [ -f audit-results.json ]; then
            VULNERABILITIES=$(jq '.metadata.vulnerabilities' audit-results.json)
            HIGH_VULN=$(echo "$VULNERABILITIES" | jq '.high // 0')
            CRITICAL_VULN=$(echo "$VULNERABILITIES" | jq '.critical // 0')
            
            echo "High severity vulnerabilities: $HIGH_VULN"
            echo "Critical severity vulnerabilities: $CRITICAL_VULN"
            
            if [ "$CRITICAL_VULN" -gt 0 ]; then
              echo "❌ Critical vulnerabilities found!"
              npm audit --audit-level=critical
              exit 1
            elif [ "$HIGH_VULN" -gt 0 ]; then
              echo "⚠️ High severity vulnerabilities found"
              npm audit --audit-level=high
            else
              echo "✅ No high or critical vulnerabilities found"
            fi
          fi
          
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: audit-results.json
          retention-days: 30
          
      - name: Check for outdated packages
        run: |
          echo "📦 Checking for outdated packages..."
          npm outdated --json > outdated-packages.json || true
          
          if [ -f outdated-packages.json ] && [ -s outdated-packages.json ]; then
            echo "⚠️ Outdated packages found:"
            cat outdated-packages.json | jq -r 'to_entries[] | "\(.key): \(.value.current) → \(.value.latest)"'
          else
            echo "✅ All packages are up to date"
          fi
          
      - name: Upload outdated packages report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outdated-packages-report
          path: outdated-packages.json
          retention-days: 30

  secret-scan:
    name: Secret Detection Scan
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.scan_type == 'secrets' || 
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == '' ||
      github.event_name != 'workflow_dispatch'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified
          
      - name: Custom secret pattern scan
        run: |
          echo "🔍 Running custom secret pattern detection..."
          
          # Define patterns to search for
          PATTERNS=(
            "WEBFLOW_API_TOKEN"
            "XANO_API_KEY"
            "XANO.*API.*KEY"
            "api[_-]?key"
            "secret[_-]?key"
            "password"
            "token"
            "Bearer\s+[A-Za-z0-9\-_]+"
            "[A-Za-z0-9]{32,}"
          )
          
          FOUND_SECRETS=false
          
          for pattern in "${PATTERNS[@]}"; do
            echo "Searching for pattern: $pattern"
            if grep -r -i -n --exclude-dir=node_modules --exclude-dir=.git \
               --exclude="*.md" --exclude="*.yml" --exclude="*.yaml" \
               "$pattern" . | grep -v "your_" | grep -v "example" | grep -v "placeholder"; then
              FOUND_SECRETS=true
              echo "⚠️ Potential secret found for pattern: $pattern"
            fi
          done
          
          if [ "$FOUND_SECRETS" = true ]; then
            echo "❌ Potential secrets detected in code"
            echo "Please review the findings above and remove any hardcoded secrets"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

  code-quality-scan:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.scan_type == 'code-quality' || 
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == '' ||
      github.event_name != 'workflow_dispatch'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint with security rules
        run: |
          echo "🔍 Running ESLint security analysis..."
          npm run lint -- --format=json --output-file=eslint-results.json || true
          
          if [ -f eslint-results.json ]; then
            ERRORS=$(jq '[.[] | select(.errorCount > 0)] | length' eslint-results.json)
            WARNINGS=$(jq '[.[] | select(.warningCount > 0)] | length' eslint-results.json)
            
            echo "Files with errors: $ERRORS"
            echo "Files with warnings: $WARNINGS"
            
            if [ "$ERRORS" -gt 0 ]; then
              echo "❌ ESLint errors found"
              npm run lint
              exit 1
            else
              echo "✅ No ESLint errors found"
            fi
          fi
          
      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-security-results
          path: eslint-results.json
          retention-days: 30
          
      - name: Analyze bundle size
        run: |
          echo "📊 Analyzing bundle size..."
          npm run build
          
          if [ -d "dist" ] || [ -d "build" ]; then
            BUILD_DIR=$([ -d "dist" ] && echo "dist" || echo "build")
            
            echo "Build directory size:"
            du -sh $BUILD_DIR
            
            echo "Individual file sizes:"
            find $BUILD_DIR -name "*.js" -o -name "*.css" | while read file; do
              SIZE=$(du -h "$file" | cut -f1)
              echo "$file: $SIZE"
            done
            
            # Check for large files (>500KB)
            LARGE_FILES=$(find $BUILD_DIR -name "*.js" -o -name "*.css" | xargs du -k | awk '$1 > 500 {print $2}')
            if [ -n "$LARGE_FILES" ]; then
              echo "⚠️ Large files detected (>500KB):"
              echo "$LARGE_FILES"
            else
              echo "✅ No unusually large files detected"
            fi
          fi

  license-scan:
    name: License Compliance Scan
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.scan_type == 'full' || 
      github.event_name == 'schedule' ||
      github.event_name != 'workflow_dispatch'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install license checker
        run: npm install -g license-checker
        
      - name: Check licenses
        run: |
          echo "📜 Checking package licenses..."
          license-checker --json --out licenses.json
          
          # Check for problematic licenses
          PROBLEMATIC_LICENSES=("GPL-3.0" "GPL-2.0" "AGPL-3.0" "LGPL-3.0")
          
          for license in "${PROBLEMATIC_LICENSES[@]}"; do
            if grep -q "$license" licenses.json; then
              echo "⚠️ Found potentially problematic license: $license"
              grep "$license" licenses.json || true
            fi
          done
          
          echo "✅ License scan completed"
          
      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  create-security-report:
    name: Create Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, code-quality-scan, license-scan]
    if: always()
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports
          
      - name: Generate security summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Scan Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependency Scan**: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Secret Detection**: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **License Compliance**: ${{ needs.license-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Analyze results
          if [[ "${{ needs.dependency-scan.result }}" == "success" && 
                "${{ needs.secret-scan.result }}" == "success" && 
                "${{ needs.code-quality-scan.result }}" == "success" && 
                "${{ needs.license-scan.result }}" == "success" ]]; then
            echo "✅ **Overall Status**: All security scans passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Overall Status**: Some security scans failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the failed scans and address any issues." >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add recommendations
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Recommendations:" >> $GITHUB_STEP_SUMMARY
          echo "- Regularly update dependencies to patch vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- Never commit API keys, tokens, or passwords to the repository" >> $GITHUB_STEP_SUMMARY
          echo "- Use environment variables for sensitive configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Review license compatibility before adding new dependencies" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor build sizes to prevent supply chain attacks" >> $GITHUB_STEP_SUMMARY
          
      - name: Create issue for security findings (if failures)
        uses: actions/github-script@v7
        if: |
          needs.dependency-scan.result == 'failure' || 
          needs.secret-scan.result == 'failure' || 
          needs.code-quality-scan.result == 'failure'
        with:
          script: |
            const title = `🔒 Security Scan Failures - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Security Scan Failures Detected
            
            **Workflow Run**: [${process.env.GITHUB_RUN_ID}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID})
            **Triggered by**: ${context.eventName}
            **Commit**: \`${context.sha.substring(0, 7)}\`
            
            ### Failed Scans:
            ${process.env.DEPENDENCY_RESULT !== 'success' ? '- ❌ Dependency Scan' : ''}
            ${process.env.SECRET_RESULT !== 'success' ? '- ❌ Secret Detection' : ''}
            ${process.env.CODE_QUALITY_RESULT !== 'success' ? '- ❌ Code Quality' : ''}
            
            ### Action Required:
            1. Review the workflow logs for detailed findings
            2. Address security vulnerabilities and issues
            3. Re-run the security workflow to verify fixes
            4. Close this issue once all security concerns are resolved
            
            ### Resources:
            - [Security Workflow Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID})
            - [Security Documentation](./SECURITY.md)
            `;
            
            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open'
            });
            
            const existingIssue = issues.data.find(issue => issue.title.includes('Security Scan Failures'));
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated', 'high-priority']
              });
              console.log('Created security issue');
            } else {
              console.log('Security issue already exists, updating...');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## New Security Scan Failure - ${new Date().toISOString().split('T')[0]}
                
                **Workflow Run**: [${process.env.GITHUB_RUN_ID}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID})
                **Commit**: \`${context.sha.substring(0, 7)}\`
                
                Please review the latest security scan results.`
              });
            }
        env:
          DEPENDENCY_RESULT: ${{ needs.dependency-scan.result }}
          SECRET_RESULT: ${{ needs.secret-scan.result }}
          CODE_QUALITY_RESULT: ${{ needs.code-quality-scan.result }}
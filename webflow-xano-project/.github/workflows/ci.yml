name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Check Prettier formatting
        run: npm run format:check
        
      - name: TypeScript type check
        run: npm run type-check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    strategy:
      matrix:
        node-version: [16, 18, 20]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results.xml
          retention-days: 5

  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Validate Webflow config
        run: node -e "
          const config = require('./frontend/src/webflow-config.js');
          console.log('✓ Webflow config loaded successfully');
          if (!config.siteId) throw new Error('Missing siteId in Webflow config');
          console.log('✓ Webflow config validation passed');
        "
        
      - name: Validate Xano config
        run: node -e "
          const config = require('./backend/config/xano-config.js');
          console.log('✓ Xano config loaded successfully');
          if (!config.workspaceId) throw new Error('Missing workspaceId in Xano config');
          console.log('✓ Xano config validation passed');
        "
        
      - name: Test Xano client instantiation
        run: node -e "
          const { XanoClient } = require('./backend/utils/xano-client.js');
          console.log('✓ XanoClient class loaded successfully');
        "
        env:
          NODE_ENV: test
          XANO_WORKSPACE_ID: test
          XANO_DEV_URL: https://test.xano.com

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [test, validate-config]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
          retention-days: 7
          
      - name: Check build size
        run: |
          if [ -d "dist" ]; then
            echo "Build size:"
            du -sh dist/
            find dist/ -name "*.js" -exec wc -l {} + | tail -1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        
      - name: Check for outdated packages
        run: npm outdated || true

  status-check:
    name: All Checks Complete
    runs-on: ubuntu-latest
    needs: [lint-and-format, test, validate-config, build, audit]
    if: always()
    
    steps:
      - name: Check all job statuses
        run: |
          echo "Lint & Format: ${{ needs.lint-and-format.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Config Validation: ${{ needs.validate-config.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security Audit: ${{ needs.audit.result }}"
          
          if [[ "${{ needs.lint-and-format.result }}" == "success" && 
                "${{ needs.test.result }}" == "success" && 
                "${{ needs.validate-config.result }}" == "success" && 
                "${{ needs.build.result }}" == "success" && 
                ("${{ needs.audit.result }}" == "success" || "${{ needs.audit.result }}" == "skipped") ]]; then
            echo "✅ All checks passed!"
            exit 0
          else
            echo "❌ Some checks failed!"
            exit 1
          fi